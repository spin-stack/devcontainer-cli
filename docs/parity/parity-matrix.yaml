    verify_cmd: "docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' ${IMAGE_NAME} | grep '^DOCKER_BUILDKIT=1$'"
    cleanup_cmd: "docker rmi -f parity-${PARITY_CASE_ID}-${PARITY_SIDE} >/dev/null 2>&1 || true"
    asserts: [exit_code, stdout_normalized]
    class: build-runtime
    current_status: match

  - id: build.output-oci-success
    lane: runtime
    command: build
    priority: p1
    docker_required: true
    network_required: true
    ts_cmd: "build --workspace-folder src/test/configs/dockerfile-with-target --output type=oci,dest=${OUTPUT_PATH}"
    setup_cmd: "BUILDER_NAME=parity-${PARITY_CASE_ID}-${PARITY_SIDE}; OUTPUT_PATH=/tmp/parity-${PARITY_CASE_ID}-${PARITY_SIDE}.tar; docker buildx rm ${BUILDER_NAME} >/dev/null 2>&1 || true; docker buildx create --name ${BUILDER_NAME} >/dev/null; docker buildx inspect --bootstrap ${BUILDER_NAME} >/dev/null; echo BUILDER_NAME=$BUILDER_NAME; echo BUILDX_BUILDER=$BUILDER_NAME; echo OUTPUT_PATH=$OUTPUT_PATH; echo DOCKER_DEFAULT_PLATFORM=linux/amd64"
    verify_cmd: "test -s ${OUTPUT_PATH}"
    cleanup_cmd: "rm -f ${OUTPUT_PATH}; docker buildx rm ${BUILDER_NAME} >/dev/null 2>&1 || true"
    asserts: [exit_code, stdout_normalized]
    class: build-runtime
    current_status: match

  - id: build.cache-to-local-success
    lane: runtime
    command: build
    priority: p1
    docker_required: true
    network_required: true
    ts_cmd: "build --workspace-folder src/test/configs/dockerfile-with-features --log-level trace --cache-to=type=local,dest=${CACHE_PATH}"
    setup_cmd: "BUILDER_NAME=parity-${PARITY_CASE_ID}-${PARITY_SIDE}; CACHE_PATH=/tmp/parity-${PARITY_CASE_ID}-${PARITY_SIDE}-cache; docker buildx rm ${BUILDER_NAME} >/dev/null 2>&1 || true; docker buildx create --name ${BUILDER_NAME} --driver docker-container >/dev/null; docker buildx inspect --bootstrap ${BUILDER_NAME} >/dev/null; echo BUILDER_NAME=$BUILDER_NAME; echo BUILDX_BUILDER=$BUILDER_NAME; echo CACHE_PATH=$CACHE_PATH"
    verify_cmd: "test -f ${CACHE_PATH}/index.json"
    cleanup_cmd: "rm -rf ${CACHE_PATH}; docker buildx rm ${BUILDER_NAME} >/dev/null 2>&1 || true"
    asserts: [exit_code, stdout_normalized]
    class: build-runtime
    current_status: match

  - id: build.cache-to-local-image-success
    lane: runtime
    command: build
    priority: p1
    docker_required: true
    network_required: true
    ts_cmd: "build --workspace-folder src/test/configs/image-with-features --log-level trace --cache-to=type=local,dest=${CACHE_PATH}"
    setup_cmd: "BUILDER_NAME=parity-${PARITY_CASE_ID}-${PARITY_SIDE}; CACHE_PATH=/tmp/parity-${PARITY_CASE_ID}-${PARITY_SIDE}-cache; docker buildx rm ${BUILDER_NAME} >/dev/null 2>&1 || true; docker buildx create --name ${BUILDER_NAME} --driver docker-container >/dev/null; docker buildx inspect --bootstrap ${BUILDER_NAME} >/dev/null; echo BUILDER_NAME=$BUILDER_NAME; echo BUILDX_BUILDER=$BUILDER_NAME; echo CACHE_PATH=$CACHE_PATH"
    verify_cmd: "test -f ${CACHE_PATH}/index.json"
    cleanup_cmd: "rm -rf ${CACHE_PATH}; docker buildx rm ${BUILDER_NAME} >/dev/null 2>&1 || true"
    asserts: [exit_code, stdout_normalized]
    class: build-runtime
    current_status: match
    notes: "Closed out by aligning the default name of `image` builds with features: without `--image-name`, TS returns `<folder>-features`."

  - id: build.platform-supported-dockerfile-success
    lane: runtime
    command: build
    priority: p1
    docker_required: true
    ts_cmd: "build --workspace-folder src/test/configs/dockerfile-with-target --platform linux/amd64 --image-name parity-${PARITY_CASE_ID}-${PARITY_SIDE}"
    verify_cmd: "test \"$(docker inspect --format '{{.Architecture}}' ${IMAGE_NAME})\" = \"amd64\" && docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' ${IMAGE_NAME} | grep '^DOCKER_BUILDKIT=1$' >/dev/null && test \"$(docker inspect --format '{{ index .Config.Labels \"test_build_options\" }}' ${IMAGE_NAME})\" = \"success\" && docker inspect --format '{{ index .Config.Labels \"devcontainer.metadata\" }}' ${IMAGE_NAME} | grep -q 'ghcr.io/devcontainers/feature-starter/hello:1' && docker inspect --format '{{ index .Config.Labels \"devcontainer.metadata\" }}' ${IMAGE_NAME} | grep -q 'ghcr.io/devcontainers/features/docker-in-docker:2' && docker inspect --format '{{ index .Config.Labels \"devcontainer.metadata\" }}' ${IMAGE_NAME} | grep -q 'postCreateCommand' && printf ok"
    cleanup_cmd: "docker rmi -f parity-${PARITY_CASE_ID}-${PARITY_SIDE} >/dev/null 2>&1 || true"
    asserts: [exit_code, stdout_normalized]
    class: build-runtime
    current_status: match
    notes: "Closed out by correctly resolving the base image of the Dockerfile target, preserving base+config+features metadata and comparing the result's semantics instead of a full `docker inspect`."

  - id: build.platform-supported-image-with-features-success
    lane: runtime
    command: build
    priority: p1
    docker_required: true
    network_required: true
    ts_cmd: "build --workspace-folder src/test/configs/image-with-features --platform linux/amd64 --image-name parity-${PARITY_CASE_ID}-${PARITY_SIDE}"
    setup_cmd: "echo DOCKER_DEFAULT_PLATFORM=linux/amd64"
    verify_cmd: "docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' ${IMAGE_NAME} | grep '^DOCKER_BUILDKIT=1$'"
    cleanup_cmd: "docker rmi -f parity-${PARITY_CASE_ID}-${PARITY_SIDE} >/dev/null 2>&1 || true"
    asserts: [exit_code, stdout_normalized]
    class: build-runtime
    current_status: match

  - id: build.unsupported-platform-failure
    lane: runtime
    command: build
    priority: p1
    docker_required: true
    ts_cmd: "build --workspace-folder src/test/configs/dockerfile-with-target --platform fake/platform"
    asserts: [exit_code]
    expect_infra_failure: true
    class: build-runtime
    current_status: match
    notes: "Invalid platform → both exit 1 (the failure IS the expected behavior). The error text
      is at the docker level and env-specific (Go `docker build` 'no match for platform
      in manifest'; TS `buildx` 'Command failed'), so only exit_code is asserted. With
      expect_infra_failure the harness compares exit codes instead of skipping via isInfraError."

  - id: build.compose-image-with-features-success
    lane: runtime
    command: build
    priority: p1
    docker_required: true
    network_required: true
    ts_cmd: "build --workspace-folder src/test/configs/compose-image-with-features --buildkit=never --image-name parity-${PARITY_CASE_ID}-${PARITY_SIDE}"
    setup_cmd: "echo DOCKER_DEFAULT_PLATFORM=linux/amd64"
    verify_cmd: "docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' ${IMAGE_NAME} | grep '^DOCKER_BUILDKIT=1$'"
    cleanup_cmd: "docker rmi -f parity-${PARITY_CASE_ID}-${PARITY_SIDE} >/dev/null 2>&1 || true"
    asserts: [exit_code, stdout_normalized]
    class: build-runtime
    current_status: match

  - id: templates.apply-docker-existing-success
    lane: runtime
    command: templates
    priority: p1
    network_required: true
    ts_cmd: "templates apply --workspace-folder /tmp/parity-tmpl-${PARITY_CASE_ID}-${PARITY_SIDE} --template-id ghcr.io/devcontainers/templates/docker-existing-docker-compose:latest"
    setup_cmd: "rm -rf /tmp/parity-tmpl-${PARITY_CASE_ID}-${PARITY_SIDE}; mkdir -p /tmp/parity-tmpl-${PARITY_CASE_ID}-${PARITY_SIDE}; echo TMPL_DIR=/tmp/parity-tmpl-${PARITY_CASE_ID}-${PARITY_SIDE}"
    verify_cmd: "test -f ${TMPL_DIR}/.devcontainer/devcontainer.json && test -f ${TMPL_DIR}/.devcontainer/docker-compose.yml && ! test -f ${TMPL_DIR}/devcontainer-template.json && ! test -f ${TMPL_DIR}/README.md && printf ok"
    cleanup_cmd: "rm -rf /tmp/parity-tmpl-${PARITY_CASE_ID}-${PARITY_SIDE}"
    asserts: [exit_code, stdout_normalized]
    class: templates-runtime
    current_status: match
    notes: "templates apply extracts the tarball and applies the files (previously {\"files\":null}); it omits devcontainer-template.json/README/NOTES and applies option defaults + ${templateOption:x} substitution."

  - id: outdated.image-with-features-success
    lane: runtime
    command: outdated
    priority: p1
    network_required: true
    ts_cmd: "outdated --workspace-folder src/test/configs/image-with-features --output-format json"
    asserts: [exit_code, stdout_normalized]
    class: outdated-runtime
    current_status: match
    notes: "outdated resolves current/wanted/latest (+ wantedMajor/latestMajor) per feature; key = full userFeatureId (with tag). Both sides query the same registry, so latest matches between them."

  - id: upgrade.image-with-features-success
    lane: runtime
    command: upgrade
    priority: p1
    network_required: true
    ts_cmd: "upgrade --workspace-folder src/test/configs/image-with-features --dry-run"
    asserts: [exit_code, stdout_normalized]
    class: upgrade-runtime
    current_status: match
    notes: "upgrade --dry-run emits the lockfile to stdout; version = concrete resolved version (not the tag), resolved = resource@digest, integrity = digest."

  - id: features.generate-docs-success
    lane: runtime
    command: features
    priority: p1
    ts_cmd: "features generate-docs -p ${GENDOCS_DIR} -n owner/repo --github-owner o --github-repo r"
    setup_cmd: "GENDOCS_DIR=/tmp/parity-gendocs-${PARITY_CASE_ID}-${PARITY_SIDE}; rm -rf $GENDOCS_DIR; cp -R reference/src/test/container-features/example-v2-features-sets/simple/src $GENDOCS_DIR; echo GENDOCS_DIR=$GENDOCS_DIR"
    verify_cmd: "cat ${GENDOCS_DIR}/color/README.md ${GENDOCS_DIR}/hello/README.md"
    cleanup_cmd: "rm -rf /tmp/parity-gendocs-${PARITY_CASE_ID}-${PARITY_SIDE}"
    asserts: [exit_code, stdout_normalized]
    class: features-runtime
    current_status: match
    notes: "generate-docs writes a README.md per feature (empty stdout); the verify compares the generated content. Faithful port of the TS template (columns 'Options Id|Description|Type|Default Value' in insertion order, deprecated/legacyIds header, customizations, NOTES.md)."

  - id: templates.generate-docs-success
    lane: runtime
    command: templates
    priority: p1
    ts_cmd: "templates generate-docs -p ${GENDOCS_DIR} --github-owner o --github-repo r"
    setup_cmd: "GENDOCS_DIR=/tmp/parity-tmpldocs-${PARITY_CASE_ID}-${PARITY_SIDE}; rm -rf $GENDOCS_DIR; cp -R reference/src/test/container-templates/example-templates-sets/simple/src $GENDOCS_DIR; echo GENDOCS_DIR=$GENDOCS_DIR"
    verify_cmd: "cat ${GENDOCS_DIR}/alpine/README.md ${GENDOCS_DIR}/node-mongo/README.md"
    cleanup_cmd: "rm -rf /tmp/parity-tmpldocs-${PARITY_CASE_ID}-${PARITY_SIDE}"
    asserts: [exit_code, stdout_normalized]
    class: templates-runtime
    current_status: match
    notes: "templates generate-docs uses TEMPLATE_README_TEMPLATE (without Registry/Namespace/Version/Customizations)."

  - id: features-info.manifest-text-success
    lane: runtime
    command: features-info
    priority: p1
    network_required: true
    ts_cmd: "features info manifest ghcr.io/devcontainers/features/node:2.1.0"
    asserts: [exit_code, stdout_normalized]
    class: features-runtime
    current_status: match
    notes: "info manifest (text): box fitted to the title (encloseStringInBox), and the manifest re-indented from raw bytes preserves the annotation order (sha256 scrubbed by normalization)."

  - id: features-info.tags-text-success
    lane: runtime
    command: features-info
    priority: p1
    network_required: true
    ts_cmd: "features info tags ghcr.io/devcontainers/features/node"
    asserts: [exit_code, stdout_normalized]
    class: features-runtime
    current_status: match
    notes: "info tags (text): tags joined with '\\n   ' (first flush, the rest indented by 3). Both sides query the same registry."

  - id: features.package-collection-success
    lane: runtime
    command: features
    priority: p1
    ts_cmd: "features package ${PKG_DIR} -o ${PKG_DIR}/out -f"
    setup_cmd: "PKG_DIR=/tmp/parity-pkg-${PARITY_CASE_ID}-${PARITY_SIDE}; rm -rf $PKG_DIR; cp -R reference/src/test/container-features/example-v2-features-sets/simple/src $PKG_DIR; echo PKG_DIR=$PKG_DIR"
    verify_cmd: "cat ${PKG_DIR}/out/devcontainer-collection.json"
    cleanup_cmd: "rm -rf /tmp/parity-pkg-${PARITY_CASE_ID}-${PARITY_SIDE}"
    asserts: [exit_code, stdout_normalized]
    class: features-runtime
    current_status: match
    notes: "features package generates devcontainer-collection.json ({sourceInformation, features:[…]}, 4-space) preserving the key order of devcontainer-feature.json (orderedmap). The verify compares that JSON; the tarball digest may differ (Go header encoding vs node-tar) but the file-list matches."

  - id: features.resolve-dependencies-success
    lane: runtime
    command: features
    priority: p1
    network_required: true
    ts_cmd: "features resolve-dependencies --workspace-folder src/test/configs/image-with-features"
    asserts: [exit_code, stdout_normalized]
    class: features-runtime
    current_status: match
    compare_hashes: true
    compare_nulls: true
    notes: "stdout = mermaid graph + installOrder JSON. The mermaid is generated with roundPriority 0 (TS default) and feature id alias (fallback to ref.ID when the annotation is missing); node hashes are scrubbed by reMermaidNode. installOrder resolved via ComputeInstallationOrder."

  - id: templates.metadata-success
    lane: runtime
    command: templates
    priority: p1
    network_required: true
    ts_cmd: "templates metadata ghcr.io/devcontainers/templates/typescript-node"
    asserts: [exit_code, stdout_normalized]
    class: templates-runtime
    current_status: match
    notes: "templates metadata emits the dev.containers.metadata annotation compacted, preserving the source key order (json.Compact, not a re-marshal that would sort them). Both sides query the same registry."

  - id: features.test-single-scenario-success
    lane: runtime
    command: features
    priority: p1
    docker_required: true
    network_required: true
    serial: true
    setup_cmd: "for n in 1 2 3; do docker pull mcr.microsoft.com/devcontainers/base:ubuntu >/dev/null 2>&1 && break; sleep 5; done; echo prepulled"
    ts_cmd: "features test --project-folder reference/src/test/container-features/example-v2-features-sets/simple --features color --skip-autogenerated --filter specific_color_scenario --base-image mcr.microsoft.com/devcontainers/base:ubuntu"
    asserts: [exit_code]
    class: features-runtime
    current_status: match
    notes: "Comparative E2E of a real scenario: builds the local feature, creates a container, runs specific_color_scenario.sh, reports the result and cleans up by label. asserts reduced to [exit_code]: the features-test stdout is a verbose, non-deterministic ANSI stream (the scenario script's output) that is not a byte-for-byte comparable surface; success/failure is discriminated by exit_code. The workspace is made accessible (chmod 0777) before the scenario runs, matching the TS CLI, so a non-root remoteUser can enter it regardless of host↔container UID mapping."

groups:
  mode-validation:
    rationale: "Close a whole family of contract bugs with a single sweep"
  enum-validation:
    rationale: "Aligns Cobra with yargs on choice flags"
  format-validation:
    rationale: "Reduces early divergences and false positives in runtime"
  wired-flags:
    rationale: "Detects flags that are exposed but have no effect"
  lifecycle-semantics:
    rationale: "Isolates real behavioral differences in hooks"
  dependency-graph:
    rationale: "Captures the remaining divergence in features info dependencies"
  container-runtime:
    rationale: "Compares commands against real containers with configuration or metadata loaded"
  lifecycle-runtime:
    rationale: "Validates real hooks and JSON envelopes over live containers"
  up-runtime:
    rationale: "Covers real container creation and compose project name"
  build-runtime:
    rationale: "Covers real builds, tagging, and compose/dockerfile paths"

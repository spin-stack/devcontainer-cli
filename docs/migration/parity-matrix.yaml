# =============================================================================
# @devcontainers/cli — Parity Matrix TS ↔ Go
# Fuente complementaria a cli-flags-inventory.yaml
# Objetivo: reducir iteraciones separando paridad por lanes y por casos chicos
# =============================================================================

meta:
  generated_for_branch: go-rewrite
  scope:
    languages: [ts, go]
    commands: [features-info, read-configuration, exec, run-user-commands, set-up, up, build]
  lanes:
    contract:
      description: "Parseo, required args, enums, formatos de error, shape de salida"
      docker_required: false
    semantic:
      description: "Comportamiento lógico con fixtures o metadata controlada"
      docker_required: mixed
    runtime:
      description: "Flujos con Docker real, compose, lifecycle, buildx"
      docker_required: true
  statuses:
    - missing
    - mismatch
    - match
    - blocked-infra
    - deferred-runtime

execution_order:
  - phase: 1
    lane: contract
    commands: [features-info, read-configuration, exec, run-user-commands, set-up]
    reason: "Mayor retorno por costo; detecta gaps de contrato sin ruido de Docker"
  - phase: 2
    lane: contract
    commands: [up, build]
    reason: "Cierra validaciones y envelopes antes de runtime"
  - phase: 3
    lane: semantic
    commands: [features-info, read-configuration, exec, run-user-commands]
    reason: "Detecta flags cableados parcialmente o semántica divergente"
  - phase: 4
    lane: runtime
    commands: [set-up, up]
    reason: "Happy path y error path mínimos"
  - phase: 5
    lane: runtime
    commands: [build]
    reason: "Mayor ruido de infraestructura; dejar último"

normalization:
  stdout_json:
    - sort_keys
    - drop_nulls
    - drop_absolute_paths
    - drop_volatile_ids
  stderr:
    - redact_timestamps
    - redact_host_paths
    - redact_container_ids
    - optionally_non_fatal
  assertions:
    - exit_code
    - stdout_normalized
    - stderr_normalized


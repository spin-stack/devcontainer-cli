groups:
  mode-validation:
    rationale: "Cerrar una familia completa de bugs de contrato con un solo sweep"
  enum-validation:
    rationale: "Alinea Cobra con yargs en flags choice"
  format-validation:
    rationale: "Reduce divergencias tempranas y falsos positivos en runtime"
  wired-flags:
    rationale: "Detecta flags expuestos pero sin efecto"
  lifecycle-semantics:
    rationale: "Aísla diferencias reales de comportamiento en hooks"
  dependency-graph:
    rationale: "Captura la divergencia restante en features info dependencies"
  container-runtime:
    rationale: "Compara comandos contra contenedores reales con configuración o metadata cargada"
  lifecycle-runtime:
    rationale: "Valida hooks reales y envelopes JSON sobre contenedores vivos"
  up-runtime:
    rationale: "Cubre creación real de contenedor y compose project name"
  build-runtime:
    rationale: "Cubre builds reales, tagging y rutas compose/dockerfile"

recommended_next_steps:
  - "Usar esta matriz para un harness A/B chico, separado del golden-test-harness actual"
  - "Implementar primero todos los casos lane=contract y priority=p0"
  - "Promover a runtime solo los casos que sigan rojos después de contract+semantic"

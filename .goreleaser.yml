version: 2

before:
  hooks:
    - go mod tidy
    # NOTE: `go test ./...` is intentionally NOT run here. It would sweep the
    # Docker/network parity suites and reference/node_modules. Gating lives in
    # the CI / tag workflow (.github/workflows/release.yml), not the release hook.

builds:
  - id: devcontainer
    main: ./cmd/devcontainer
    binary: devcontainer
    env:
      - CGO_ENABLED=0
    # Linux-only scope (amd64 + arm64). darwin and windows are not supported.
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/devcontainers/cli/internal/product.version={{.Version}}
      - -X github.com/devcontainers/cli/internal/product.name=devcontainer

archives:
  - id: default
    format: tar.gz
    name_template: "devcontainer_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# SBOM generation per archive. Requires `syft` on the runner
# (the goreleaser-action installs it via anchore/sbom-action, or install it
# manually: `curl -sSfL https://get.anchore.io/syft | sh`).
sboms:
  - id: archive
    artifacts: archive

# Multi-arch OCI images. GoReleaser reuses the binaries built above (one image
# per arch, matched by goos/goarch + ids) and feeds them to ./Dockerfile, which
# COPYs the binary onto distroless/static:nonroot. Requires buildx on the runner
# (docker/setup-buildx-action) and a GHCR login; images are pushed on the tag
# release run only (see .github/workflows/release.yml).
#
# NOTE on attestations: buildx `--provenance`/`--sbom` flags are intentionally
# NOT set here. They turn each single-arch image into an OCI index, which the
# classic `docker manifest create` used by `docker_manifests:` below cannot nest
# ("... is a manifest list", exit 1 — verified empirically). Image-level SBOM and
# keyless signing/provenance are produced in the release workflow with syft +
# cosign against the pushed manifest digest. The `sboms:` block above still emits
# a syft SBOM of the archive (the exact binary shipped in the image).
dockers:
  - id: amd64
    goos: linux
    goarch: amd64
    ids:
      - devcontainer
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/spin-stack/devcontainer-cli:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=REVISION={{ .FullCommit }}"
      - "--label=org.opencontainers.image.title=devcontainer-cli"
      - "--label=org.opencontainers.image.source=https://github.com/spin-stack/devcontainer-cli"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
  - id: arm64
    goos: linux
    goarch: arm64
    ids:
      - devcontainer
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/spin-stack/devcontainer-cli:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=REVISION={{ .FullCommit }}"
      - "--label=org.opencontainers.image.title=devcontainer-cli"
      - "--label=org.opencontainers.image.source=https://github.com/spin-stack/devcontainer-cli"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"

docker_manifests:
  - name_template: "ghcr.io/spin-stack/devcontainer-cli:{{ .Version }}"
    image_templates:
      - "ghcr.io/spin-stack/devcontainer-cli:{{ .Version }}-amd64"
      - "ghcr.io/spin-stack/devcontainer-cli:{{ .Version }}-arm64"
  - name_template: "ghcr.io/spin-stack/devcontainer-cli:latest"
    image_templates:
      - "ghcr.io/spin-stack/devcontainer-cli:{{ .Version }}-amd64"
      - "ghcr.io/spin-stack/devcontainer-cli:{{ .Version }}-arm64"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^Update PROGRESS"

release:
  github:
    owner: spin-stack
    name: devcontainer-cli
  draft: true
  prerelease: auto
  name_template: "Go CLI v{{.Version}}"
  header: |
    ## Dev Container CLI (Go)

    This is the Go rewrite of the @devcontainers/cli. Supported platform: Linux (amd64, arm64).

    ### Installation

    Download the binary for your platform and add it to your PATH:

    ```bash
    # Linux amd64
    curl -Lo devcontainer.tar.gz https://github.com/devcontainers/cli/releases/download/v{{.Version}}/devcontainer_{{.Version}}_linux_amd64.tar.gz
    tar xzf devcontainer.tar.gz
    chmod +x devcontainer
    sudo mv devcontainer /usr/local/bin/

    # Linux arm64
    curl -Lo devcontainer.tar.gz https://github.com/devcontainers/cli/releases/download/v{{.Version}}/devcontainer_{{.Version}}_linux_arm64.tar.gz
    tar xzf devcontainer.tar.gz
    chmod +x devcontainer
    sudo mv devcontainer /usr/local/bin/
    ```

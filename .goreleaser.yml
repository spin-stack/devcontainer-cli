version: 2

before:
  hooks:
    - go mod tidy
    # NOTE: `go test ./...` is intentionally NOT run here. It would sweep the
    # Docker/network parity suites and reference/node_modules. Gating lives in
    # the CI / tag workflow (.github/workflows/release.yml), not the release hook.

builds:
  - id: devcontainer
    main: ./cmd/devcontainer
    binary: devcontainer
    env:
      - CGO_ENABLED=0
    # Linux-only scope (amd64 + arm64). darwin and windows are not supported.
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/devcontainers/cli/internal/product.version={{.Version}}
      - -X github.com/devcontainers/cli/internal/product.name=devcontainer

archives:
  - id: default
    formats: [tar.gz]
    name_template: "devcontainer_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# SBOM generation per archive. Requires `syft` on the runner
# (the goreleaser-action installs it via anchore/sbom-action, or install it
# manually: `curl -sSfL https://get.anchore.io/syft | sh`).
sboms:
  - id: archive
    artifacts: archive

# Multi-arch OCI image (dockers_v2: single multi-platform buildx build + manifest
# via buildx imagetools, replacing the per-arch dockers: + docker_manifests:).
# GoReleaser reuses the binaries built above (matched per platform by ids +
# goos/goarch) and feeds them to ./Dockerfile, which COPYs the binary onto
# distroless/static:nonroot. Requires buildx on the runner (docker/setup-buildx-
# action) + a GHCR login; pushed on the tag release run only (release.yml).
#
# Image-level SBOM + keyless provenance/signing are produced in the release
# workflow with syft + cosign against the pushed manifest digest. The sboms:
# block above still emits a syft SBOM of the archive (the exact binary shipped).
dockers_v2:
  - id: default
    ids:
      - devcontainer
    dockerfile: Dockerfile
    images:
      - ghcr.io/spin-stack/devcontainer-cli
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    build_args:
      VERSION: "{{ .Version }}"
      REVISION: "{{ .FullCommit }}"
    labels:
      org.opencontainers.image.title: devcontainer-cli
      org.opencontainers.image.source: https://github.com/spin-stack/devcontainer-cli
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.created: "{{ .Date }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^Update PROGRESS"

release:
  github:
    owner: spin-stack
    name: devcontainer-cli
  draft: true
  prerelease: auto
  name_template: "Go CLI v{{.Version}}"
  header: |
    ## Dev Container CLI (Go)

    This is the Go rewrite of the @devcontainers/cli. Supported platform: Linux (amd64, arm64).

    ### Installation

    Download the binary for your platform and add it to your PATH:

    ```bash
    # Linux amd64
    curl -Lo devcontainer.tar.gz https://github.com/devcontainers/cli/releases/download/v{{.Version}}/devcontainer_{{.Version}}_linux_amd64.tar.gz
    tar xzf devcontainer.tar.gz
    chmod +x devcontainer
    sudo mv devcontainer /usr/local/bin/

    # Linux arm64
    curl -Lo devcontainer.tar.gz https://github.com/devcontainers/cli/releases/download/v{{.Version}}/devcontainer_{{.Version}}_linux_arm64.tar.gz
    tar xzf devcontainer.tar.gz
    chmod +x devcontainer
    sudo mv devcontainer /usr/local/bin/
    ```
